# DEPRECATED: This workflow is superseded by the release-please automation (release-please.yml).
# Use this only as a fallback if release-please fails.
# To be removed after the first successful automated release.
name: "[DEPRECATED] Release Account UI (Manual)"

on:
  workflow_dispatch:
    inputs:
      packageVersion:
        description: "The version to publish in MAJOR.MINOR.PATCH format (e.g., 1.1.0)"
        required: true
        default: ""

jobs:
  release:
    env:
      PACKAGE_VERSION: ${{ github.event.inputs.packageVersion }}
    name: Release
    runs-on: ubuntu-latest
    environment: publish
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: 'Setup'
        uses: ./.github/actions/setup

      - name: Set version
        run: yarn workspace @base-org/account-ui version ${{ env.PACKAGE_VERSION }}

      - name: Build Packages
        run: yarn build:packages

      - name: Set deployment token
        run: npm config set '//registry.npmjs.org/:_authToken' "${{ secrets.NPM_TOKEN }}"

      - name: Publish to npm
        run: |
          cd packages/account-ui
          npm publish --tag latest --access public
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
