name: Release Account (Canary)

on:
  workflow_dispatch:
    inputs:
      packageVersion:
        description: >
          Base version for the canary release in MAJOR.MINOR.PATCH format.
          Leave empty to auto-detect from the pending release-please PR.
          Examples:
            - Empty (default): reads version from Release PR (e.g., 2.6.0) and publishes 2.6.0-canary.<timestamp>
            - "3.0.0": publishes 3.0.0-canary.<timestamp> (use to override when no Release PR exists)
        required: false
        default: ""

jobs:
  canary:
    name: Release canary
    runs-on: ubuntu-latest
    environment: publish
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup
        uses: ./.github/actions/setup

      - name: Resolve base version
        id: version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -n "${{ github.event.inputs.packageVersion }}" ]; then
            echo "base=${{ github.event.inputs.packageVersion }}" >> "$GITHUB_OUTPUT"
          else
            VERSION=$(gh pr list --label "autorelease: pending" --json title --jq '.[] | select(.title | test("chore\\(account\\)")) | .title | capture("release (?<v>[0-9]+\\.[0-9]+\\.[0-9]+)") | .v')
            if [ -z "$VERSION" ]; then
              echo "::error::No pending release-please PR found for account. Please provide a version manually."
              exit 1
            fi
            echo "base=$VERSION" >> "$GITHUB_OUTPUT"
          fi

      - name: Update npm
        run: npm install -g npm@latest

      - name: Set version
        run: yarn workspace @base-org/account version ${{ steps.version.outputs.base }}-canary.$(date +'%Y%m%d%H%M%S')

      - name: Prebuild Packages
        run: yarn workspace @base-org/account prebuild

      - name: Build Packages
        run: yarn workspace @base-org/account build

      - name: Publish to npm
        run: |
          cd packages/account-sdk
          npm publish --tag canary --access public
