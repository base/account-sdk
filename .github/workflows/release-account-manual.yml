# DEPRECATED: This workflow is superseded by the release-please automation (release-please.yml).
# Use this only as a fallback if release-please fails.
# To be removed after the first successful automated release.
name: "[DEPRECATED] Release Account (Manual)"

on:
  workflow_dispatch:
    inputs:
      packageVersion:
        description: "The version to publish in MAJOR.MINOR.PATCH format (e.g., 2.6.0)"
        required: true
        default: ""

jobs:
  release:
    env:
      PACKAGE_VERSION: ${{ github.event.inputs.packageVersion }}
    name: Release
    runs-on: ubuntu-latest
    environment: publish
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: 'Setup'
        uses: ./.github/actions/setup

      - name: Update npm
        run: |
          npm install -g npm@latest

      - name: Set version
        run: yarn workspace @base-org/account version ${{ env.PACKAGE_VERSION }}

      # Build the package
      - name: Prebuild Packages
        run: yarn workspace @base-org/account prebuild

      - name: Build Packages
        run: yarn workspace @base-org/account build

      - name: Publish to npm
        run: |
          cd packages/account-sdk
          npm publish --tag latest --access public
